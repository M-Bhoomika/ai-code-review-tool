# End-to-end integration stack.
#
# Runs the core platform with E2E_INTEGRATION=true so external GitHub/OpenAI
# are replaced by deterministic stubs while PostgreSQL, Redis, Celery, API,
# GraphQL, and the dashboard use real application code.
#
# Usage:
#   docker compose -f docker-compose.e2e.yml up --build -d
#   python scripts/e2e_validate.py
#   cd frontend && npm run test:e2e:integration
#   docker compose -f docker-compose.e2e.yml down -v

name: ai-code-review-e2e

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: code_review
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "exit 0"]
      interval: 10s
      timeout: 5s
      retries: 6

  api:
    build:
      context: ./api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/code_review
      REDIS_URL: redis://redis:6379/0
      CHROMA_URL: http://chromadb:8000
      GITHUB_WEBHOOK_SECRET: e2e-webhook-secret
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_SERVICE_NAME: ai-code-review-api
    ports:
      - "8010:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: ./worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/code_review
      REDIS_URL: redis://redis:6379/0
      CHROMA_URL: http://chromadb:8000
      E2E_INTEGRATION: "true"
      USE_GITHUB_APP_AUTH: "false"
      USE_LANGGRAPH: "true"
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_SERVICE_NAME: ai-code-review-worker
      MLFLOW_ENABLED: "true"
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: ai-code-review
    volumes:
      - mlflow_e2e_data:/mlflow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
      mlflow:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8010
    ports:
      - "3010:3000"
    depends_on:
      api:
        condition: service_healthy

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16687:16686"
      - "4318:4317"

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow/mlflow.db --default-artifact-root /mlflow/artifacts --serve-artifacts --allowed-hosts "mlflow:5000,localhost:*,127.0.0.1:*"
    environment:
      MLFLOW_SERVER_ALLOWED_HOSTS: "mlflow:5000,localhost:*,127.0.0.1:*"
    ports:
      - "5001:5000"
    volumes:
      - mlflow_e2e_data:/mlflow

volumes:
  mlflow_e2e_data:
