apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: code-review
  labels:
    app.kubernetes.io/name: mlflow
    app.kubernetes.io/part-of: code-review
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mlflow
  ports:
    - name: http
      port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: code-review
  labels:
    app.kubernetes.io/name: mlflow
    app.kubernetes.io/part-of: code-review
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mlflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mlflow
        app.kubernetes.io/part-of: code-review
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:latest
          env:
            - name: MLFLOW_SERVER_ALLOWED_HOSTS
              value: "mlflow:5000,localhost:*,127.0.0.1:*"
          command:
            - mlflow
            - server
            - --host
            - 0.0.0.0
            - --port
            - "5000"
            - --backend-store-uri
            - sqlite:///mlflow/mlflow.db
            - --default-artifact-root
            - /mlflow/artifacts
            - --serve-artifacts
            - --allowed-hosts
            - "mlflow:5000,localhost:*,127.0.0.1:*"
          ports:
            - containerPort: 5000
              name: http
          volumeMounts:
            - name: mlflow-data
              mountPath: /mlflow
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: mlflow-data
          persistentVolumeClaim:
            claimName: mlflow-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-data
  namespace: code-review
  labels:
    app.kubernetes.io/name: mlflow
    app.kubernetes.io/part-of: code-review
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
