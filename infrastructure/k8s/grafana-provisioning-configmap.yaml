apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: code-review
  labels:
    app.kubernetes.io/part-of: code-review
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: AI Code Review
        orgId: 1
        folder: AI Code Review
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
