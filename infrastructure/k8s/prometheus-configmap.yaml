apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: code-review
  labels:
    app.kubernetes.io/part-of: code-review
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: api
        metrics_path: /metrics
        static_configs:
          - targets: ["api:8000"]

      - job_name: worker
        metrics_path: /metrics
        static_configs:
          - targets: ["worker:9100"]
