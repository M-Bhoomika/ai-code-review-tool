apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: code-review
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: code-review
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: code-review
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: code-review
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: code-review
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: grafana-provisioning
              mountPath: /etc/grafana/provisioning
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: grafana-provisioning
          projected:
            sources:
              - configMap:
                  name: grafana-provisioning
                  items:
                    - key: datasource.yml
                      path: datasources/datasource.yml
                    - key: dashboards.yml
                      path: dashboards/dashboards.yml
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
