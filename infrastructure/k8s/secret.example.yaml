# Example Secret — copy to secret.yaml, fill in real values, and apply.
# Do NOT commit secret.yaml with real credentials.
#
#   cp secret.example.yaml secret.yaml
#   # edit secret.yaml
#   kubectl apply -f secret.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: code-review-secrets
  namespace: code-review
  labels:
    app.kubernetes.io/part-of: code-review
type: Opaque
stringData:
  # Postgres (must match POSTGRES_USER / POSTGRES_DB in configmap.yaml)
  POSTGRES_PASSWORD: "change-me"

  # Full SQLAlchemy URL used by api and worker
  DATABASE_URL: "postgresql://postgres:change-me@postgres:5432/code_review"

  # API webhook verification
  GITHUB_WEBHOOK_SECRET: ""

  # Worker GitHub auth (PAT path — default when USE_GITHUB_APP_AUTH=false)
  GITHUB_TOKEN: ""

  # Worker GitHub App auth (required when USE_GITHUB_APP_AUTH=true)
  GITHUB_PRIVATE_KEY: ""

  # OpenAI (worker LLM review generation)
  OPENAI_API_KEY: ""

  # Optional OpenAI-compatible provider override
  OPENAI_BASE_URL: ""
