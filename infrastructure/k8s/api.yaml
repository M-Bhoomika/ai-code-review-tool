apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: code-review
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: code-review
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: code-review
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: code-review
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/part-of: code-review
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "waiting for postgres..."
                sleep 2
              done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do
                echo "waiting for redis..."
                sleep 2
              done
      containers:
        - name: api
          # Build from repo root: docker build -t code-review-api:latest ./api
          image: code-review-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: code-review-config
            - secretRef:
                name: code-review-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: code-review-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: REDIS_URL
            - name: CHROMA_URL
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: CHROMA_URL
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: code-review-secrets
                  key: GITHUB_WEBHOOK_SECRET
            - name: GITHUB_APP_ID
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: GITHUB_APP_ID
            - name: GITHUB_API_URL
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: GITHUB_API_URL
            - name: OTEL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: OTEL_ENABLED
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: OTEL_EXPORTER_OTLP_INSECURE
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: OTEL_EXPORTER_OTLP_INSECURE
            - name: OTEL_SERVICE_NAME
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: OTEL_SERVICE_NAME_API
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
