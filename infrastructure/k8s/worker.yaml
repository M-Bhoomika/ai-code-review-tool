# Celery worker with Prometheus metrics on :9100/metrics.
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: code-review
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: code-review
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: worker
  ports:
    - name: metrics
      port: 9100
      targetPort: 9100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: code-review
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: code-review
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/part-of: code-review
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "waiting for postgres..."
                sleep 2
              done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do
                echo "waiting for redis..."
                sleep 2
              done
        - name: wait-for-api
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://api:8000/health; do
                echo "waiting for api migrations..."
                sleep 3
              done
      containers:
        - name: worker
          # Build from repo root: docker build -t code-review-worker:latest ./worker
          image: code-review-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: code-review-config
            - secretRef:
                name: code-review-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: code-review-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: REDIS_URL
            - name: CHROMA_URL
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: CHROMA_URL
            - name: USE_GITHUB_APP_AUTH
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: USE_GITHUB_APP_AUTH
            - name: USE_LANGGRAPH
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: USE_LANGGRAPH
            - name: OPENAI_MODEL
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: OPENAI_MODEL
            - name: GITHUB_API_URL
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: GITHUB_API_URL
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: code-review-secrets
                  key: GITHUB_TOKEN
            - name: GITHUB_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: code-review-secrets
                  key: GITHUB_PRIVATE_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: code-review-secrets
                  key: OPENAI_API_KEY
            - name: OPENAI_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: code-review-secrets
                  key: OPENAI_BASE_URL
            - name: OTEL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: OTEL_ENABLED
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: OTEL_EXPORTER_OTLP_INSECURE
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: OTEL_EXPORTER_OTLP_INSECURE
            - name: OTEL_SERVICE_NAME
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: OTEL_SERVICE_NAME_WORKER
            - name: WORKER_METRICS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: WORKER_METRICS_ENABLED
            - name: WORKER_METRICS_PORT
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: WORKER_METRICS_PORT
            - name: MLFLOW_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: MLFLOW_ENABLED
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: MLFLOW_TRACKING_URI
            - name: MLFLOW_EXPERIMENT_NAME
              valueFrom:
                configMapKeyRef:
                  name: code-review-config
                  key: MLFLOW_EXPERIMENT_NAME
          ports:
            - containerPort: 9100
              name: metrics
          volumeMounts:
            - name: mlflow-data
              mountPath: /mlflow
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 1Gi
      volumes:
        - name: mlflow-data
          persistentVolumeClaim:
            claimName: mlflow-data
