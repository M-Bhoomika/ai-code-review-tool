apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chromadb-data
  namespace: code-review
  labels:
    app.kubernetes.io/name: chromadb
    app.kubernetes.io/part-of: code-review
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: chromadb
  namespace: code-review
  labels:
    app.kubernetes.io/name: chromadb
    app.kubernetes.io/part-of: code-review
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: chromadb
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromadb
  namespace: code-review
  labels:
    app.kubernetes.io/name: chromadb
    app.kubernetes.io/part-of: code-review
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chromadb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chromadb
        app.kubernetes.io/part-of: code-review
    spec:
      containers:
        - name: chromadb
          image: chromadb/chroma:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: chromadb-data
