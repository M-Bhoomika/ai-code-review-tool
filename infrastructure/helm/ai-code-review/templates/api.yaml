{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.api.service.name }}
  namespace: {{ include "ai-code-review.namespace" . }}
  labels:
    {{- include "ai-code-review.componentLabels" (dict "component" "api") | nindent 4 }}
    {{- include "ai-code-review.labels" . | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  selector:
    {{- include "ai-code-review.componentSelectorLabels" (dict "component" "api") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.targetPort }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.api.service.name }}
  namespace: {{ include "ai-code-review.namespace" . }}
  labels:
    {{- include "ai-code-review.componentLabels" (dict "component" "api") | nindent 4 }}
    {{- include "ai-code-review.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "ai-code-review.componentSelectorLabels" (dict "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai-code-review.componentLabels" (dict "component" "api") | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-postgres
          image: {{ include "ai-code-review.image" .Values.initContainer.image }}
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.postgres.service.name }} {{ .Values.postgres.service.port }}; do
                echo "waiting for postgres..."
                sleep 2
              done
        - name: wait-for-redis
          image: {{ include "ai-code-review.image" .Values.initContainer.image }}
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.redis.service.name }} {{ .Values.redis.service.port }}; do
                echo "waiting for redis..."
                sleep 2
              done
      containers:
        - name: api
          image: {{ include "ai-code-review.image" .Values.api.image }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.service.targetPort }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "ai-code-review.configMapName" . }}
            {{- if .Values.secret.create }}
            - secretRef:
                name: {{ include "ai-code-review.secretName" . }}
            {{- end }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-code-review.secretName" . }}
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ai-code-review.configMapName" . }}
                  key: REDIS_URL
            - name: CHROMA_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ai-code-review.configMapName" . }}
                  key: CHROMA_URL
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-code-review.secretName" . }}
                  key: GITHUB_WEBHOOK_SECRET
            - name: GITHUB_APP_ID
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ai-code-review.configMapName" . }}
                  key: GITHUB_APP_ID
            - name: GITHUB_API_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ai-code-review.configMapName" . }}
                  key: GITHUB_API_URL
            - name: OTEL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ai-code-review.configMapName" . }}
                  key: OTEL_ENABLED
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ai-code-review.configMapName" . }}
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: OTEL_EXPORTER_OTLP_INSECURE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ai-code-review.configMapName" . }}
                  key: OTEL_EXPORTER_OTLP_INSECURE
            - name: OTEL_SERVICE_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ai-code-review.configMapName" . }}
                  key: OTEL_SERVICE_NAME_API
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
{{- end }}
