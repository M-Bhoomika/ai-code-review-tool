{{- if .Values.postgres.enabled }}
{{- if .Values.postgres.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: {{ include "ai-code-review.namespace" . }}
  labels:
    {{- include "ai-code-review.componentLabels" (dict "component" "postgres") | nindent 4 }}
    {{- include "ai-code-review.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.postgres.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.postgres.persistence.size }}
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.postgres.service.name }}
  namespace: {{ include "ai-code-review.namespace" . }}
  labels:
    {{- include "ai-code-review.componentLabels" (dict "component" "postgres") | nindent 4 }}
    {{- include "ai-code-review.labels" . | nindent 4 }}
spec:
  type: {{ .Values.postgres.service.type }}
  selector:
    {{- include "ai-code-review.componentSelectorLabels" (dict "component" "postgres") | nindent 4 }}
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port }}
      targetPort: {{ .Values.postgres.service.targetPort }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.postgres.service.name }}
  namespace: {{ include "ai-code-review.namespace" . }}
  labels:
    {{- include "ai-code-review.componentLabels" (dict "component" "postgres") | nindent 4 }}
    {{- include "ai-code-review.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.postgres.replicaCount }}
  selector:
    matchLabels:
      {{- include "ai-code-review.componentSelectorLabels" (dict "component" "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai-code-review.componentLabels" (dict "component" "postgres") | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: {{ include "ai-code-review.image" .Values.postgres.image }}
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.postgres.service.targetPort }}
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ai-code-review.configMapName" . }}
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ai-code-review.configMapName" . }}
                  key: POSTGRES_DB
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-code-review.secretName" . }}
                  key: POSTGRES_PASSWORD
          {{- if .Values.postgres.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          {{- end }}
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.env.postgresUser | quote }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.env.postgresUser | quote }}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
      {{- if .Values.postgres.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
      {{- end }}
{{- end }}
