{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.redis.service.name }}
  namespace: {{ include "ai-code-review.namespace" . }}
  labels:
    {{- include "ai-code-review.componentLabels" (dict "component" "redis") | nindent 4 }}
    {{- include "ai-code-review.labels" . | nindent 4 }}
spec:
  type: {{ .Values.redis.service.type }}
  selector:
    {{- include "ai-code-review.componentSelectorLabels" (dict "component" "redis") | nindent 4 }}
  ports:
    - name: redis
      port: {{ .Values.redis.service.port }}
      targetPort: {{ .Values.redis.service.targetPort }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.redis.service.name }}
  namespace: {{ include "ai-code-review.namespace" . }}
  labels:
    {{- include "ai-code-review.componentLabels" (dict "component" "redis") | nindent 4 }}
    {{- include "ai-code-review.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.redis.replicaCount }}
  selector:
    matchLabels:
      {{- include "ai-code-review.componentSelectorLabels" (dict "component" "redis") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai-code-review.componentLabels" (dict "component" "redis") | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ include "ai-code-review.image" .Values.redis.image }}
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.redis.service.targetPort }}
              name: redis
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
{{- end }}
