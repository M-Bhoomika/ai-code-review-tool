{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: {{ include "ai-code-review.namespace" . }}
  labels:
    {{- include "ai-code-review.labels" . | nindent 4 }}
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://{{ .Values.prometheus.service.name }}:{{ .Values.prometheus.service.port }}
        isDefault: true
        editable: true
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: AI Code Review
        orgId: 1
        folder: AI Code Review
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: {{ include "ai-code-review.namespace" . }}
  labels:
    {{- include "ai-code-review.labels" . | nindent 4 }}
data:
  review-metrics.json: |-
{{ .Files.Get "grafana/review-metrics.json" | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.grafana.service.name }}
  namespace: {{ include "ai-code-review.namespace" . }}
  labels:
    {{- include "ai-code-review.componentLabels" (dict "component" "grafana") | nindent 4 }}
    {{- include "ai-code-review.labels" . | nindent 4 }}
spec:
  type: {{ .Values.grafana.service.type }}
  selector:
    {{- include "ai-code-review.componentSelectorLabels" (dict "component" "grafana") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.grafana.service.port }}
      targetPort: {{ .Values.grafana.service.targetPort }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.grafana.service.name }}
  namespace: {{ include "ai-code-review.namespace" . }}
  labels:
    {{- include "ai-code-review.componentLabels" (dict "component" "grafana") | nindent 4 }}
    {{- include "ai-code-review.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "ai-code-review.componentSelectorLabels" (dict "component" "grafana") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai-code-review.componentLabels" (dict "component" "grafana") | nindent 8 }}
    spec:
      containers:
        - name: grafana
          image: {{ include "ai-code-review.image" .Values.grafana.image }}
          imagePullPolicy: {{ .Values.grafana.image.pullPolicy }}
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.grafana.adminUser | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.grafana.adminPassword | quote }}
          ports:
            - containerPort: {{ .Values.grafana.service.targetPort }}
              name: http
          volumeMounts:
            - name: grafana-provisioning
              mountPath: /etc/grafana/provisioning
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
      volumes:
        - name: grafana-provisioning
          projected:
            sources:
              - configMap:
                  name: grafana-provisioning
                  items:
                    - key: datasource.yml
                      path: datasources/datasource.yml
                    - key: dashboards.yml
                      path: dashboards/dashboards.yml
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
{{- end }}
