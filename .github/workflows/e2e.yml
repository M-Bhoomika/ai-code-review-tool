name: End-to-End Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start E2E stack
        run: docker compose -f docker-compose.e2e.yml up --build -d

      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8010/health && curl -sf http://localhost:8010/reviews/health; then
              echo "API is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "API failed to become healthy"
          docker compose -f docker-compose.e2e.yml logs
          exit 1

      - name: Run API smoke validation
        run: python scripts/e2e_validate.py
        env:
          E2E_API_URL: http://localhost:8010

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run dashboard integration test
        working-directory: frontend
        env:
          CI: true
          E2E_INTEGRATION_FRONTEND_URL: http://localhost:3010
        run: npm run test:e2e:integration

      - name: Show service logs on failure
        if: failure()
        run: docker compose -f docker-compose.e2e.yml logs

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
